<button routerLink="/create">create new</button>
<table mat-table [dataSource]="datasource" class="mat-elevation-z8">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> id </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="cin">
    <th mat-header-cell *matHeaderCellDef> cin </th>
    <td mat-cell *matCellDef="let element"> {{element.cin}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> name </th>
    <td mat-cell *matCellDef="let element"> {{element.name}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>type </th>
    <td mat-cell *matCellDef="let element"> {{element.type}} </td>
  </ng-container>
<ng-container matColumnDef="age">
    <th mat-header-cell *matHeaderCellDef>age </th>
    <td mat-cell *matCellDef="let element"> {{element.age}} </td>
  </ng-container>
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>email </th>
    <td mat-cell *matCellDef="let element"> {{element.email}} </td>
  </ng-container>
  <ng-container matColumnDef="action">
  <th mat-header-cell *matHeaderCellDef> Action </th>

  <td mat-cell *matCellDef="let element">
    <button
      mat-icon-button
      color="warn"
      (click)="deleteMember(element.id)"
      matTooltip="Delete"
    >
      <mat-icon>delete</mat-icon>
    </button>

    <button
    routerLink="/{{element.id}}/edit"
      mat-icon-button
      color="primary"
      (click)="editMember(element.id)"
      matTooltip="Edit"
    >
      <mat-icon>edit</mat-icon>
    </button>
  </td>
</ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  
</table>
